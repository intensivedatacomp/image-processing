repos:
  # General formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace  # Trims trailing whitespace.
      - id: end-of-file-fixer  # Makes sure files end in a newline and only a newline.
      - id: check-yaml  # Attempts to load all yaml files to verify syntax.
      - id: check-json  # Attempts to load all yaml files to verify syntax.
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: check-added-large-files  # Prevent giant files from being committed.
        args: [ '--maxkb=5000' ]

  # --- Black (Python files) ---
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3

  # --- Black (Jupyter notebooks via nbqa) ---
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.8.5
    hooks:
      - id: nbqa-black
        additional_dependencies: [black]

  # --- Ruff (fast lint + autofix) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff-format # This runs `ruff format`
      - id: ruff-check  # This runs `ruff check`
        args: ["--fix"] # otherwise not compatible with Ruff

  # --- Ruff on notebooks ---
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        additional_dependencies: [ruff]

  # --- Mypy (type checking) ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: []

  # --- Docstring style (NumPy) ---
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=numpy]
