name: Build and Deploy Docs

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths-ignore:
      - '.badges/**'
  pull_request:
    branches: [ master, main ]

# Serialize deployments; never cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/halmosb/docker-builder/python:3.14-cpu-v0.3.4
      options: --user 0
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build HTML docs
        run: |
          mkdir -p docs/source/_static
          sphinx-build -W -T -b html docs/source docs/_build/html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
